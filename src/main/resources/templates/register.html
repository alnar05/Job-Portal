<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h4 mb-1">Create account</h1>
                    <p class="text-muted mb-0">Join as employer or candidate</p>
                </div>

                <form th:action="@{/register}" th:object="${registrationForm}" method="post" autocomplete="off">

                    <!-- Global errors block -->
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <ul>
                            <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" th:field="*{email}" class="form-control"
                               placeholder="you@example.com">
                        <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" type="password" th:field="*{password}" class="form-control">
                        <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label class="form-label" for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" type="password" th:field="*{confirmPassword}" class="form-control">
                        <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}"
                             th:errors="*{confirmPassword}"></div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('passwordConfirmed')}"
                             th:errors="*{passwordConfirmed}"></div>
                    </div>

                    <!-- Role -->
                    <div class="mb-3">
                        <label class="form-label" for="role">Role</label>
                        <select id="role" th:field="*{role}" class="form-select">
                            <option value="">Select role</option>
                            <option value="EMPLOYER">Employer</option>
                            <option value="CANDIDATE">Candidate</option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                    </div>

                    <!-- Employer Fields -->
                    <div class="mb-3" id="companyNameGroup">
                        <label class="form-label" for="companyName">Company Name</label>
                        <input id="companyName" type="text" th:field="*{companyName}" class="form-control">
                        <div class="text-danger small" th:if="${#fields.hasErrors('companyNameValidForEmployer')}"
                             th:errors="*{companyNameValidForEmployer}"></div>
                    </div>

                    <div class="mb-3" id="websiteGroup">
                        <label class="form-label" for="website">Website (optional)</label>
                        <input id="website" type="url" th:field="*{website}" class="form-control"
                               placeholder="https://example.com">
                    </div>


                    <!-- Candidate Fields -->
                    <div class="mb-3" id="fullNameGroup">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input id="fullName" type="text" th:field="*{fullName}" class="form-control">
                        <div class="text-danger small" th:if="${#fields.hasErrors('fullNameValidForCandidate')}"
                             th:errors="*{fullNameValidForCandidate}"></div>
                    </div>

                    <div class="mb-4" id="resumeUrlGroup">
                        <label class="form-label" for="resumeUrl">Resume URL (optional)</label>
                        <input id="resumeUrl" type="url" th:field="*{resumeUrl}" class="form-control"
                               placeholder="https://example.com/resume.pdf">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Already have an account?</span>
                    <a th:href="@{/login}" class="text-decoration-none ms-1">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        const roleSelect = document.getElementById('role');
        const companyNameGroup = document.getElementById('companyNameGroup');
        const fullNameGroup = document.getElementById('fullNameGroup');
        const websiteGroup = document.getElementById('websiteGroup');
        const resumeUrlGroup = document.getElementById('resumeUrlGroup');

        function toggleRoleFields() {
            const role = roleSelect.value;
            companyNameGroup.style.display = role === 'EMPLOYER' ? 'block' : 'none';
            websiteGroup.style.display = role === 'EMPLOYER' ? 'block' : 'none';
            fullNameGroup.style.display = role === 'CANDIDATE' ? 'block' : 'none';
            resumeUrlGroup.style.display = role === 'CANDIDATE' ? 'block' : 'none';
        }

        roleSelect.addEventListener('change', toggleRoleFields);
        toggleRoleFields();
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
