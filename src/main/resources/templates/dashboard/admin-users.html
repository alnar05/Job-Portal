<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head('Admin Users | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3"><h2>Admin User Management</h2><a
            th:href="@{/dashboard/admin}" class="btn btn-outline-secondary">Back</a></div>

    <form class="row g-2 mb-3" th:action="@{/admin/users}" method="get">
        <div class="col"><input class="form-control" name="email" placeholder="Email" th:value="${filter.email}"></div>
        <div class="col"><select class="form-select" name="role">
            <option value="">Any role</option>
            <option th:each="r:${roles}" th:value="${r}" th:text="${r}" th:selected="${filter.role == r}"></option>
        </select></div>
        <div class="col"><select class="form-select" name="enabled">
            <option value="">Any status</option>
            <option value="true" th:selected="${filter.enabled == true}">Enabled</option>
            <option value="false" th:selected="${filter.enabled == false}">Disabled</option>
        </select></div>
        <div class="col"><input type="date" class="form-control" name="registeredFrom"
                                th:value="${filter.registeredFrom}"></div>
        <div class="col"><input type="date" class="form-control" name="registeredTo" th:value="${filter.registeredTo}">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary">Filter</button>
        </div>
    </form>

    <form th:action="@{/admin/users/bulk-status}" method="post">
        <div class="mb-2 d-flex gap-2">
            <button class="btn btn-sm btn-warning" name="enabled" value="false">Disable Selected</button>
            <button class="btn btn-sm btn-success" name="enabled" value="true">Enable Selected</button>
        </div>
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th><input type="checkbox"
                                   onclick="document.querySelectorAll('.u-check').forEach(c=>c.checked=this.checked)">
                        </th>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td><input class="u-check" type="checkbox" name="userIds" th:value="${user.id}"></td>
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.roles}"></td>
                        <td th:text="${user.enabled ? 'Enabled' : 'Disabled'}"></td>
                        <td th:text="${user.createdAt}"></td>
                        <td><a th:href="@{/admin/users/{id}(id=${user.id})}"
                               class="btn btn-sm btn-outline-primary">View</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </form>
</div>
<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
