<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head('Admin Users | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Admin User Management</h2>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div class="mb-3">
        <a th:href="@{/admin/users(role='EMPLOYER')}" class="btn" th:classappend="${selectedRole.name() == 'EMPLOYER'} ? ' btn-primary' : ' btn-outline-primary'">Employers</a>
        <a th:href="@{/admin/users(role='CANDIDATE')}" class="btn" th:classappend="${selectedRole.name() == 'CANDIDATE'} ? ' btn-primary' : ' btn-outline-primary'">Candidates</a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge" th:classappend="${user.enabled} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${user.enabled ? 'Enabled' : 'Disabled'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary">View</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between mt-3">
        <a class="btn btn-outline-secondary"
           th:if="${users.hasPrevious()}"
           th:href="@{/admin/users(role=${selectedRole}, page=${users.number - 1}, size=${users.size})}">Previous</a>
        <span>Page <span th:text="${users.number + 1}"></span> / <span th:text="${users.totalPages == 0 ? 1 : users.totalPages}"></span></span>
        <a class="btn btn-outline-secondary"
           th:if="${users.hasNext()}"
           th:href="@{/admin/users(role=${selectedRole}, page=${users.number + 1}, size=${users.size})}">Next</a>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
