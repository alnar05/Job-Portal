<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head('Admin User Details | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container" th:if="${user != null}">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">User Details #<span th:text="${user.id}"></span></h2>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Back to Users</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
            <p><strong>Roles:</strong> <span th:text="${user.roles}"></span></p>
            <p><strong>Status:</strong> <span th:text="${user.enabled ? 'Enabled' : 'Disabled'}"></span></p>

            <div class="d-flex gap-2 mt-3">
                <form th:action="@{/admin/users/{id}/status(id=${user.id})}" method="post">
                    <input type="hidden" name="enabled" th:value="${!user.enabled}">
                    <button type="submit" class="btn btn-warning"
                            th:text="${user.enabled ? 'Disable Account' : 'Enable Account'}"></button>
                </form>

                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                      onsubmit="return confirm('Delete this user account?');">
                    <button type="submit" class="btn btn-danger">Delete User</button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
