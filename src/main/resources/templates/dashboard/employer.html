<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><th:block th:replace="~{layout :: head('Employer Dashboard | Job Portal')}"></th:block></head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div class="container">
    <h2>Employer Dashboard</h2>
    <p><strong>Total Views:</strong> <span th:text="${totalViews}"></span> | <strong>Total Applications:</strong> <span th:text="${totalApplications}"></span></p>
    <table class="table">
        <thead><tr><th>Job</th><th>Views</th><th>Applications</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody><tr th:each="job : ${jobs}">
            <td th:text="${job.title}"></td><td th:text="${job.viewCount}"></td><td th:text="${job.applicationCount}"></td><td th:text="${job.status}"></td>
            <td><a th:href="@{/applications/job/{id}(id=${job.id})}" class="btn btn-sm btn-outline-dark">Manage</a></td>
        </tr></tbody>
    </table>
</div>
</body>
</html>
