<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head('Employer Dashboard | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Employer Dashboard</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/profile/edit}" class="btn btn-outline-secondary">Edit Profile</a>
            <a th:href="@{/jobs/create}" class="btn btn-primary">Post Job</a>
        </div>
    </div>

    <div th:replace="~{dashboard/employer :: section('Active Jobs', ${activeJobs}, false)}"></div>
    <div th:replace="~{dashboard/employer :: section('Expired Jobs', ${expiredJobs}, true)}"></div>
    <div th:replace="~{dashboard/employer :: section('Closed Jobs', ${closedJobs}, false)}"></div>
</div>

<th:block th:fragment="section(title, jobs, expired)">
    <div class="card shadow-sm mb-3">
        <div class="card-header" th:text="${title}"></div>
        <div class="card-body" th:if="${#lists.isEmpty(jobs)}">No jobs in this group.</div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(jobs)}">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Job Title</th>
                    <th>Status</th>
                    <th>Expires on</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <td th:text="${job.title}"></td>
                    <td th:text="${job.status}"></td>
                    <td th:text="${job.closingDate}"></td>
                    <td class="d-flex gap-1 flex-wrap">
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary">View</a>
                        <a th:href="@{/applications/job/{jobId}(jobId=${job.id})}" class="btn btn-sm btn-outline-dark">Applicants</a>
                        <a th:if="${expired}" th:href="@{/jobs/{id}/duplicate(id=${job.id})}"
                           class="btn btn-sm btn-outline-success">Duplicate</a>
                        <a th:if="${!expired}" th:href="@{/jobs/edit/{id}(id=${job.id})}"
                           class="btn btn-sm btn-outline-warning">Edit</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>

    <th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
