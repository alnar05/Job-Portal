<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Employer Dashboard | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Employer Dashboard</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/profile/edit}" class="btn btn-outline-secondary">Edit Profile</a>
            <a th:href="@{/jobs/create}" class="btn btn-primary">Post Job</a>
        </div>
    </div>

    <div class="card shadow-sm" th:if="${!#lists.isEmpty(jobs)}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Job Title</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <td th:text="${job.title}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(job.salary, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td>
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary">View</a>
                        <a th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-sm btn-outline-warning">Edit</a>
                        <a th:href="@{/applications/job/{jobId}(jobId=${job.id})}" class="btn btn-sm btn-outline-dark">Applications</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="alert alert-info" th:if="${#lists.isEmpty(jobs)}">You haven't posted any jobs yet.</div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
