<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h4 mb-1">Job Portal Login</h1>
                    <p class="text-muted mb-0">Sign in to continue</p>
                </div>

                <div th:if="${param.error != null and param.error[0] == 'bad_credentials'}" class="alert alert-danger" role="alert">
                    Invalid email or password. Please try again.
                </div>

                <div th:if="${param.error != null and param.error[0] == 'disabled'}" class="alert alert-warning" role="alert">
                    Your account has been disabled. Please contact the administrator.
                </div>

                <div th:if="${param.error != null and param.error[0] == 'auth'}" class="alert alert-danger" role="alert">
                    Authentication failed. Please try again.
                </div>

                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                    You have been logged out successfully.
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>

                <form th:action="@{/login}" method="post" autocomplete="off" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="username" autocomplete="off" class="form-label">Email</label>
                        <input type="email" autocomplete="new-password" class="form-control" id="username" name="username" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Don't have an account?</span>
                    <a th:href="@{/register}" class="text-decoration-none ms-1">Register</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
