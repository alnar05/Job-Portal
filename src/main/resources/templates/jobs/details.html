<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Job Details | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container" th:if="${job != null}">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title" th:text="${job.title}">Job title</h2>
            <h6 class="text-muted mb-3" th:text="${job.companyName}">Company</h6>
            <p class="card-text" th:text="${job.description}">Description</p>
            <p class="fw-semibold" th:text="${'Salary: $' + #numbers.formatDecimal(job.salary, 1, 'COMMA', 2, 'POINT')}">Salary</p>

            <div class="d-flex flex-wrap gap-2 mt-4">
                <form sec:authorize="hasRole('CANDIDATE')" th:action="@{/applications/apply/{jobId}(jobId=${job.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-success">Apply</button>
                </form>

                <a sec:authorize="hasRole('EMPLOYER') and @authService.isCurrentEmployerJob(#vars['job'].id)" th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-warning">Edit</a>
                <form sec:authorize="hasRole('EMPLOYER') and @authService.isCurrentEmployerJob(#vars['job'].id)" th:action="@{/jobs/delete/{id}(id=${job.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this job posting?');">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>

                <a sec:authorize="hasRole('ADMIN')" th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-warning">Edit</a>
                <form sec:authorize="hasRole('ADMIN')" th:action="@{/jobs/delete/{id}(id=${job.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this job posting?');">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="container" th:if="${job == null}">
    <div class="alert alert-warning">Job not found.</div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
