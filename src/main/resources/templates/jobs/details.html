<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Job Details | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container" th:if="${job != null}">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title" th:text="${job.title}">Job title</h2>
            <h6 class="text-muted mb-3" th:text="${job.companyName}">Company</h6>
            <p class="card-text" th:text="${job.description}">Description</p>
            <p class="mb-1" th:text="${job.jobType}">Job type</p>
            <p class="mb-1" th:text="${job.location}">Location</p>
            <p class="mb-1" th:text="${'Closes: ' + job.closingDate}">Closing date</p>
            <p class="mb-1" th:text="${'Views: ' + job.viewCount + ' | Applications: ' + job.applicationCount}"></p>
            <p class="fw-semibold" th:text="${'Salary: $' + #numbers.formatDecimal(job.salary, 1, 'COMMA', 2, 'POINT')}">Salary</p>

            <div class="d-flex flex-wrap gap-2 mt-4">
                <form sec:authorize="hasRole('CANDIDATE')" th:action="@{/applications/apply/{jobId}(jobId=${job.id})}" method="post" enctype="multipart/form-data" class="w-100">
                    <label for="coverLetter" class="form-label">Cover letter (optional)</label>
                    <textarea id="coverLetter" name="coverLetter" class="form-control mb-2" rows="4" maxlength="2000"
                              placeholder="Add a short message to the employer (optional, up to 200 words)"></textarea>
                    <label for="resumeFile" class="form-label">Upload CV (PDF/DOCX optional)</label>
                    <input id="resumeFile" type="file" name="resumeFile" class="form-control mb-2" accept=".pdf,.doc,.docx">
                    <button type="submit" class="btn btn-success">Apply</button>
                </form>

                <a sec:authorize="hasRole('EMPLOYER') and @authService.isCurrentEmployerJob(#vars['job'].id)" th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-warning">Edit</a>
                <form sec:authorize="hasRole('EMPLOYER') and @authService.isCurrentEmployerJob(#vars['job'].id)" th:action="@{/jobs/{id}/close(id=${job.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger">Close Job</button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
