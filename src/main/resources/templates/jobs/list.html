<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Jobs | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Available Jobs</h2>
        <a sec:authorize="hasRole('EMPLOYER')" th:href="@{/jobs/create}" class="btn btn-primary">Post New Job</a>
    </div>

    <form th:action="@{/jobs}" method="get" class="card shadow-sm mb-4">
        <div class="card-body row g-3">
            <div class="col-md-3"><input name="keyword" class="form-control" placeholder="Keyword" th:value="${keyword}"></div>
            <div class="col-md-2"><input name="location" class="form-control" placeholder="Location" th:value="${location}"></div>
            <div class="col-md-2"><input name="companyName" class="form-control" placeholder="Company" th:value="${companyName}"></div>
            <div class="col-md-2"><input type="number" min="0" step="0.01" name="minSalary" class="form-control" placeholder="Min Salary" th:value="${minSalary}"></div>
            <div class="col-md-2"><input type="number" min="0" step="0.01" name="maxSalary" class="form-control" placeholder="Max Salary" th:value="${maxSalary}"></div>
            <div class="col-md-2">
                <select name="sort" class="form-select">
                    <option th:each="opt : ${sortOptions}" th:value="${opt}" th:selected="${opt == selectedSort}"
                            th:text="${opt == 'highest_salary' ? 'Highest salary' : (opt == 'closing_date' ? 'Closing date' : 'Newest')}"></option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-primary">Search</button>
                <a th:href="@{/jobs}" class="btn btn-outline-secondary">Clear</a>
            </div>
        </div>
    </form>

    <div class="row g-3" th:if="${!#lists.isEmpty(jobs)}">
        <div class="col-md-6 col-lg-4" th:each="job : ${jobs}">
            <div class="card h-100 shadow-sm"><div class="card-body">
                <h5 th:text="${job.title}"></h5><h6 th:text="${job.companyName}" class="text-muted"></h6>
                <p th:text="${#strings.abbreviate(job.description, 120)}"></p>
                <p th:text="${'Views: '+job.viewCount+' | Applications: '+job.applicationCount}"></p>
                <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline-primary">View</a>
            </div></div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
