<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Jobs | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Available Jobs</h2>
        <a sec:authorize="hasRole('EMPLOYER')" th:href="@{/jobs/create}" class="btn btn-primary">Post New Job</a>
    </div>

    <form th:action="@{/jobs}" method="get" class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6 col-lg-4">
                    <label for="keyword" class="form-label">Keyword</label>
                    <input id="keyword" name="keyword" type="text" class="form-control"
                           placeholder="Search title or description" th:value="${keyword}">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="location" class="form-label">Location</label>
                    <input id="location" name="location" type="text" class="form-control"
                           placeholder="e.g. Berlin" th:value="${location}">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="jobType" class="form-label">Job Type</label>
                    <select id="jobType" name="jobType" class="form-select">
                        <option value="">All job types</option>
                        <option th:each="type : ${jobTypes}"
                                th:value="${type}"
                                th:text="${type}"
                                th:selected="${type == selectedJobType}"></option>
                    </select>
                </div>
                <div class="col-md-6 col-lg-3">
                    <label for="minSalary" class="form-label">Minimum Salary</label>
                    <input id="minSalary" name="minSalary" type="number" step="0.01" min="0" class="form-control"
                           placeholder="e.g. 30000" th:value="${minSalary}">
                </div>
                <div class="col-md-6 col-lg-3">
                    <label for="maxSalary" class="form-label">Maximum Salary</label>
                    <input id="maxSalary" name="maxSalary" type="number" step="0.01" min="0" class="form-control"
                           placeholder="e.g. 120000" th:value="${maxSalary}">
                </div>
                <div class="col-12 d-flex gap-2 align-items-end">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:href="@{/jobs}" class="btn btn-outline-secondary">Clear Filters</a>
                </div>
            </div>
        </div>
    </form>

    <div class="row g-3" th:if="${!#lists.isEmpty(jobs)}">
        <div class="col-md-6 col-lg-4" th:each="job : ${jobs}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${job.title}"></h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${job.companyName}"></h6>
                    <p class="card-text" th:text="${#strings.abbreviate(job.description, 140)}"></p>
                    <p class="mb-1" th:text="${job.jobType}"></p>
                    <p class="mb-1" th:text="${job.location}"></p>
                    <p class="mb-1" th:text="${'Closes: ' + job.closingDate}"></p>
                    <p class="fw-semibold mt-auto mb-3" th:text="${'Salary: $' + #numbers.formatDecimal(job.salary, 1, 'COMMA', 2, 'POINT')}"></p>
                    <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline-primary">View Details</a>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center mt-4" th:if="${jobPage.totalPages > 1}">
        <nav aria-label="Jobs pagination">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${jobPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/jobs(page=${jobPage.number - 1}, keyword=${keyword}, location=${location}, jobType=${selectedJobType}, minSalary=${minSalary}, maxSalary=${maxSalary})}">
                        Previous
                    </a>
                </li>
                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, jobPage.totalPages - 1)}"
                    th:classappend="${pageNumber == jobPage.number} ? 'active'">
                    <a class="page-link"
                       th:text="${pageNumber + 1}"
                       th:href="@{/jobs(page=${pageNumber}, keyword=${keyword}, location=${location}, jobType=${selectedJobType}, minSalary=${minSalary}, maxSalary=${maxSalary})}"></a>
                </li>
                <li class="page-item" th:classappend="${jobPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/jobs(page=${jobPage.number + 1}, keyword=${keyword}, location=${location}, jobType=${selectedJobType}, minSalary=${minSalary}, maxSalary=${maxSalary})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(jobs)}">No jobs found for the selected filters.</div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
