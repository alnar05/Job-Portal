<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('Application Details | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container" th:if="${application != null}">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h4 mb-3">Application #<span th:text="${application.id}"></span></h2>
            <p class="mb-1"><strong>Job:</strong> <span th:text="${application.jobTitle}"></span></p>
            <p class="mb-1"><strong>Candidate:</strong> <span th:text="${application.candidateName}"></span></p>
            <p class="mb-1"><strong>Applied At:</strong> <span th:text="${#temporals.format(application.appliedAt, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p class="mb-3"><strong>Status:</strong>
                <span class="badge text-bg-secondary" th:text="${application.status}"></span>
            </p>

            <h6>Cover letter</h6>
            <p th:text="${#strings.isEmpty(application.coverLetter) ? '-' : application.coverLetter}"></p>

            <div class="d-flex gap-2 mt-4" sec:authorize="hasRole('ADMIN') or @authService.isCurrentEmployerApplication(#vars['application'].id)">
                <form th:action="@{/applications/{id}/accept(id=${application.id})}" method="post">
                    <button type="submit" class="btn btn-success"
                            th:disabled="${application.status.name() == 'ACCEPTED' || application.status.name() == 'REJECTED'}">Accept</button>
                </form>
                <form th:action="@{/applications/{id}/reject(id=${application.id})}" method="post">
                    <button type="submit" class="btn btn-danger"
                            th:disabled="${application.status.name() == 'ACCEPTED' || application.status.name() == 'REJECTED'}">Reject</button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
