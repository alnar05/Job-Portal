<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout :: head('Application Details')}"></th:block></head>
<body class="bg-light"><div th:replace="~{layout :: navbar}"></div>
<div class="container" th:if="${applicationDetails != null}">
    <h3>Application #<span th:text="${applicationDetails.id}"></span></h3>
    <p><strong>Status:</strong> <span th:text="${applicationDetails.status}"></span></p>
    <p><strong>Cover Letter:</strong> <span th:text="${applicationDetails.coverLetter}"></span></p>
    <p><strong>Internal Notes:</strong> <span th:text="${applicationDetails.internalNotes}"></span></p>
    <form method="post" th:action="@{/applications/{id}/notes(id=${applicationDetails.id})}">
        <textarea class="form-control" name="internalNotes" placeholder="Add internal notes"></textarea>
        <button class="btn btn-outline-secondary mt-2">Save Notes</button>
    </form>
</div>
</body>
</html>
