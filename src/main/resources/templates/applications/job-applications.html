<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout :: head('Job Applications | Job Portal')}"></th:block></head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div class="container">
    <h2>Applications for <span th:text="${job.title}"></span></h2>
    <form method="post" th:action="@{/applications/bulk}">
        <input type="hidden" name="jobId" th:value="${job.id}">
        <div class="mb-2 d-flex gap-2">
            <button class="btn btn-success btn-sm" name="accept" value="true">Bulk Accept</button>
            <button class="btn btn-danger btn-sm" name="accept" value="false">Bulk Reject</button>
            <input class="form-control" name="internalNotes" placeholder="Optional internal note">
        </div>
        <table class="table table-bordered">
            <thead><tr><th>Select</th><th>Candidate</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
            <tbody><tr th:each="app : ${applications}">
                <td><input type="checkbox" name="applicationIds" th:value="${app.id}"></td>
                <td th:text="${app.candidateName}"></td>
                <td th:text="${app.status}"></td>
                <td th:text="${app.internalNotes}"></td>
                <td><a th:href="@{/applications/{id}(id=${app.id})}" class="btn btn-sm btn-outline-primary">View</a></td>
            </tr></tbody>
        </table>
    </form>
</div>
</body>
</html>
