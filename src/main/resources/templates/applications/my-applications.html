<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layout :: head('My Applications | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <h2 class="mb-3">My Applications</h2>

    <div class="card shadow-sm" th:if="${applications != null and !#lists.isEmpty(applications)}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Job</th>
                    <th>Applied At</th>
                    <th>Cover Letter</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="app : ${applications}">
                    <td th:text="${app.id}">1</td>
                    <td th:text="${app.jobTitle}">Job</td>
                    <td th:text="${app.appliedAt}">Date</td>
                    <td th:text="${#strings.isEmpty(app.coverLetter) ? '-' : app.coverLetter}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="alert alert-info" th:if="${applications == null or #lists.isEmpty(applications)}">You have no applications yet.</div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
