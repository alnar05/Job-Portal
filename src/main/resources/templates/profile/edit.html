<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head('Edit Profile | Job Portal')}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: flash-messages}"></div>

<div class="container">
    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/profile/edit}" th:object="${profileForm}" method="post" enctype="multipart/form-data">
            <div th:if="${isEmployer}">
                <input class="form-control mb-2" th:field="*{companyName}" placeholder="Company Name">
                <input class="form-control mb-2" th:field="*{website}" placeholder="Website">
            </div>
            <div th:unless="${isEmployer}">
                <input class="form-control mb-2" th:field="*{fullName}" placeholder="Full Name">
                <input class="form-control mb-2" th:field="*{resumeUrl}" placeholder="Resume URL">
                <input class="form-control mb-2" type="file" name="resumeFile" accept=".pdf,.doc,.docx">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div></div>
</div>
</body>
</html>
